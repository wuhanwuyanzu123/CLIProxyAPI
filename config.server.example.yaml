host: "0.0.0.0"
port: 8317
tls:
  enable: false
  cert: ""
  key: ""
remote-management:
  allow-remote: true
  secret-key: "CHANGE_ME_BCRYPT_HASH"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"
auth-dir: "~/.cli-proxy-api"
proxy-url: ""
api-keys:
  - CHANGE_ME_API_KEY
# OAuth credentials are stored under auth-dir on the target server.

# System settings
debug: true
logging-to-file: true
usage-statistics-enabled: true
# Expose Codex OAuth model under Claude Desktop's requested model id.
oauth-model-alias:
  codex:
    - name:  gpt-5.5
      alias: claude-sonnet-4-6
      fork: true
